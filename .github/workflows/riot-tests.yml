name: Riot API Automated Tests

# This tells GitHub WHEN to run the server.
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # This adds a button to let you run it manually.

jobs:
  execute-tests:
    # This dictates the operating system of the cloud server.
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Newman CLI
        run: npm install -g newman

      - name: 4. Execute Test Suite
        env:
          # This pulls your key from the secure vault into the server's memory.
          SECURE_API_KEY: ${{ secrets.RIOT_API_KEY }}
        
        # Replace the .json filenames below with your actual file names.
        # Ensure the --env-var target matches the variable name in your Postman environment.
        run: |
          newman run "Riot API MVP.postman_collection.json" \
            -e "Riot API - Dev.postman_environment.json" \
            --env-var "riot_api_key=$SECURE_API_KEY"